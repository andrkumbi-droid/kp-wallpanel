<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KP Wallpanel — Warehouse Display</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1117; color: #fff; font-family: Arial, sans-serif; min-height: 100vh; }

  .header {
    background: #1a1d27;
    padding: 12px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 3px solid #00b894;
    height: 60px;
  }
  .logo { font-size: 20px; font-weight: 900; color: #00b894; }
  .logo-sub { font-size: 12px; color: #888; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #00b894; display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
  .clock { font-size: 32px; font-weight: 900; font-variant-numeric: tabular-nums; }
  .dateth { font-size: 12px; color: #888; text-align: right; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .cols {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    height: calc(100vh - 60px);
  }
  .col { padding: 14px; border-right: 1px solid #2a2d3a; overflow-y: auto; }
  .col:last-child { border-right: none; }

  .col-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid;
  }
  .col-header.new { border-color: #fdcb6e; }
  .col-header.packing { border-color: #74b9ff; }
  .col-header.ready { border-color: #00b894; }

  .col-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
  .col-title.new { color: #fdcb6e; }
  .col-title.packing { color: #74b9ff; }
  .col-title.ready { color: #00b894; }

  .cnt { font-size: 12px; font-weight: 700; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .cnt.new { background: #fdcb6e22; color: #fdcb6e; }
  .cnt.packing { background: #74b9ff22; color: #74b9ff; }
  .cnt.ready { background: #00b89422; color: #00b894; }

  .card { border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; border-left: 4px solid; }
  .card.new { background: #1a1d27; border-color: #fdcb6e; animation: blink 1.2s infinite; }
  .card.packing { background: #1a1d27; border-color: #74b9ff; }
  .card.ready { background: #1a1d27; border-color: #00b894; }

  @keyframes blink {
    0%,100% { box-shadow: 0 0 0 0 #fdcb6e00; }
    50% { box-shadow: 0 0 16px 3px #fdcb6e44; }
  }

  .order-id { font-size: 28px; font-weight: 900; margin-bottom: 4px; }
  .order-customer { font-size: 13px; color: #ccc; }
  .order-zone { font-size: 12px; color: #666; margin-bottom: 8px; }

  .items { border-top: 1px solid #2a2d3a; padding-top: 8px; margin-top: 6px; }
  .item { display: flex; justify-content: space-between; font-size: 13px; padding: 2px 0; }
  .item-code { font-weight: 700; }
  .item-qty { color: #00b894; font-weight: 700; }
  .clips { font-size: 12px; color: #aaa; margin-top: 6px; background: #0f1117; padding: 5px 8px; border-radius: 5px; }
  .order-time { font-size: 11px; color: #444; text-align: right; margin-top: 6px; }

  /* Buttons */
  .btn-accept {
    width: 100%; padding: 12px; margin-top: 10px;
    background: #fdcb6e; color: #1a1d27;
    border: none; border-radius: 8px;
    font-size: 15px; font-weight: 900; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-accept:active { opacity: 0.8; transform: scale(0.98); }

  .btn-done {
    width: 100%; padding: 12px; margin-top: 10px;
    background: #00b894; color: #fff;
    border: none; border-radius: 8px;
    font-size: 15px; font-weight: 900; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-done:active { opacity: 0.8; transform: scale(0.98); }

  .btn-back {
    width: 100%; padding: 8px; margin-top: 6px;
    background: #333; color: #aaa;
    border: none; border-radius: 8px;
    font-size: 13px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-back:active { opacity: 0.8; }

  .empty { text-align: center; padding: 40px 10px; color: #333; font-size: 13px; }
  .empty-icon { font-size: 32px; margin-bottom: 6px; }

  .alert-border { position: fixed; inset: 0; border: 6px solid #fdcb6e; pointer-events: none; opacity: 0; z-index: 100; }
  .alert-border.show { opacity: 1; animation: borderBlink 0.8s infinite; }
  @keyframes borderBlink { 0%,100%{border-color:#fdcb6e} 50%{border-color:transparent} }

  .alert-box {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: #fdcb6e; color: #1a1d27;
    font-size: 36px; font-weight: 900; padding: 20px 40px;
    border-radius: 16px; text-align: center; pointer-events: none; opacity: 0; z-index: 101;
  }
  .alert-box.show { opacity: 1; animation: boxPulse 0.8s infinite; }
  @keyframes boxPulse { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.04)} }
  .alert-sub { font-size: 16px; font-weight: 400; margin-top: 4px; }
</style>
</head>
<body>

<div class="alert-border" id="ab"></div>
<div class="alert-box" id="ax">
  🔔 ออเดอร์ใหม่เข้า!
  <div class="alert-sub">กรุณารับออเดอร์</div>
</div>

<div class="header">
  <div>
    <div class="logo">📦 KP Wallpanel — Warehouse</div>
    <div class="logo-sub"><span class="dot"></span>Live real-time</div>
  </div>
  <div style="text-align:right">
    <div class="clock" id="clock">00:00:00</div>
    <div class="dateth" id="dateth"></div>
  </div>
</div>

<div class="cols">
  <div class="col">
    <div class="col-header new">
      <span class="col-title new">🆕 NEW / ใหม่</span>
      <span class="cnt new" id="cnt-new">0</span>
    </div>
    <div id="col-new"></div>
  </div>
  <div class="col">
    <div class="col-header packing">
      <span class="col-title packing">📦 PACKING / แพ็คอยู่</span>
      <span class="cnt packing" id="cnt-packing">0</span>
    </div>
    <div id="col-packing"></div>
  </div>
  <div class="col">
    <div class="col-header ready">
      <span class="col-title ready">✅ READY / พร้อมส่ง</span>
      <span class="cnt ready" id="cnt-ready">0</span>
    </div>
    <div id="col-ready"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyBhUzwMR28dvulez9q6AZ4gZS80Y9VK0qQ",
  authDomain: "kp-wallpanel.firebaseapp.com",
  databaseURL: "https://kp-wallpanel-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kp-wallpanel",
  storageBucket: "kp-wallpanel.firebasestorage.app",
  messagingSenderId: "794246593779",
  appId: "1:794246593779:web:703fc0a4ba89ba58734b86"
});
var db = firebase.database();

function tick() {
  var n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
  var days=['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'];
  var months=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  document.getElementById('dateth').textContent='วัน'+days[n.getDay()]+' '+n.getDate()+' '+months[n.getMonth()]+' '+(n.getFullYear()+543);
}
setInterval(tick,1000); tick();

function playSound() {
  try {
    var ctx = new (window.AudioContext||window.webkitAudioContext)();
    function b(f,t,d){var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;g.gain.setValueAtTime(0.4,ctx.currentTime+t);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+d);o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+d+0.05);}
    b(440,0,0.15);b(550,0.2,0.15);b(660,0.4,0.15);b(880,0.6,0.4);
    b(440,1.2,0.15);b(550,1.4,0.15);b(660,1.6,0.15);b(880,1.8,0.4);
  } catch(e){}
}

var alertOn=false, alertTimer=null;
function startAlert() {
  if(alertOn) return;
  alertOn=true;
  document.getElementById('ab').classList.add('show');
  document.getElementById('ax').classList.add('show');
  playSound();
  alertTimer=setInterval(playSound,3000);
}
function stopAlert() {
  alertOn=false; clearInterval(alertTimer);
  document.getElementById('ab').classList.remove('show');
  document.getElementById('ax').classList.remove('show');
}

// Firebase actions
function acceptOrder(id) {
  db.ref('orders/'+id+'/status').set('packing');
  db.ref('orders/'+id+'/log').push({status:'packing',time:new Date().toISOString(),by:'Warehouse'});
}
function donePackingOrder(id) {
  db.ref('orders/'+id+'/status').set('ready');
  db.ref('orders/'+id+'/log').push({status:'ready',time:new Date().toISOString(),by:'Warehouse'});
}
function backToNew(id) {
  db.ref('orders/'+id+'/status').set('new');
  db.ref('orders/'+id+'/log').push({status:'new',time:new Date().toISOString(),by:'Warehouse'});
}
function backToPacking(id) {
  db.ref('orders/'+id+'/status').set('packing');
  db.ref('orders/'+id+'/log').push({status:'packing',time:new Date().toISOString(),by:'Warehouse'});
}

function buildItems(o) {
  var li=o.lineItems||[];
  var panels=li.filter(function(i){return i.type==='panel';});
  var edges=li.filter(function(i){return i.type==='lcorner'||i.type==='utrim'||i.type==='ttrim'||i.type==='pvc';});
  var clips=li.reduce(function(a,i){return (i.type==='free-clips'||i.type==='clips'||i.type==='free-gift-clips')?a+(parseInt(i.qty)||0):a;},0);
  var html='<div class="items">';
  panels.forEach(function(i){html+='<div class="item"><span class="item-code">'+i.code+'</span><span class="item-qty">'+i.qty+' pcs</span></div>';});
  edges.forEach(function(i){
    var t={lcorner:'L-Corner',utrim:'U-Trim',ttrim:'T-Trim',pvc:'PVC'}[i.type]||'';
    html+='<div class="item"><span class="item-code">'+t+' '+i.code+'</span><span class="item-qty">'+i.qty+' pcs</span></div>';
  });
  html+='</div>';
  if(clips>0) html+='<div class="clips">📎 Clips: <strong>'+clips.toLocaleString()+' pcs</strong></div>';
  return html;
}

var knownNew=null;

function render(orders) {
  var nw=[],pk=[],rd=[];
  var newSet=new Set();
  Object.values(orders||{}).forEach(function(o){
    if(!o||!o.id||o.id==='undefined') return;
    if(o.status==='new'){nw.push(o);newSet.add(o.id);}
    else if(o.status==='packing') pk.push(o);
    else if(o.status==='ready') rd.push(o);
  });

  if(knownNew!==null){
    var hasNew=false;
    newSet.forEach(function(id){if(!knownNew.has(id))hasNew=true;});
    if(hasNew) startAlert();
  }
  if(newSet.size===0) stopAlert();
  knownNew=newSet;

  document.getElementById('cnt-new').textContent=nw.length;
  document.getElementById('cnt-packing').textContent=pk.length;
  document.getElementById('cnt-ready').textContent=rd.length;

  // NEW column
  document.getElementById('col-new').innerHTML = nw.length===0
    ? '<div class="empty"><div class="empty-icon">😴</div>ไม่มีออเดอร์ใหม่</div>'
    : nw.map(function(o){
        return '<div class="card new">'+
          '<div class="order-id">'+o.id+'</div>'+
          '<div class="order-customer">👤 '+(o.customer||'—')+'</div>'+
          '<div class="order-zone">📍 '+(o.zone||'')+'</div>'+
          buildItems(o)+
          '<button class="btn-accept" onclick="acceptOrder(\''+o.id+'\')">✋ รับออเดอร์ / Accept</button>'+
          '<div class="order-time">'+(o.date||'')+'</div>'+
          '</div>';
      }).join('');

  // PACKING column
  document.getElementById('col-packing').innerHTML = pk.length===0
    ? '<div class="empty"><div class="empty-icon">💤</div>ไม่มีออเดอร์</div>'
    : pk.map(function(o){
        return '<div class="card packing">'+
          '<div class="order-id">'+o.id+'</div>'+
          '<div class="order-customer">👤 '+(o.customer||'—')+'</div>'+
          '<div class="order-zone">📍 '+(o.zone||'')+'</div>'+
          buildItems(o)+
          '<button class="btn-done" onclick="donePackingOrder(\''+o.id+'\')">✅ แพ็คเสร็จ / Done</button>'+
          '<button class="btn-back" onclick="backToNew(\''+o.id+'\')">↩ ย้ายกลับ New</button>'+
          '<div class="order-time">'+(o.date||'')+'</div>'+
          '</div>';
      }).join('');

  // READY column
  document.getElementById('col-ready').innerHTML = rd.length===0
    ? '<div class="empty"><div class="empty-icon">🕐</div>รอ Driver รับ</div>'
    : rd.map(function(o){
        return '<div class="card ready">'+
          '<div class="order-id">'+o.id+'</div>'+
          '<div class="order-customer">👤 '+(o.customer||'—')+'</div>'+
          '<div class="order-zone">📍 '+(o.zone||'')+'</div>'+
          buildItems(o)+
          '<div style="text-align:center;padding:8px;font-size:13px;color:#00b894">⏳ รอ Driver มารับ</div>'+
          '<button class="btn-back" onclick="backToPacking(\''+o.id+'\')">↩ ย้ายกลับ Packing</button>'+
          '<div class="order-time">'+(o.date||'')+'</div>'+
          '</div>';
      }).join('');
}

db.ref('orders').on('value', function(snap){ render(snap.val()||{}); });
</script>
</body>
</html>
