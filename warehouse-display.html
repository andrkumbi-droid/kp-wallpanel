<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KP Wallpanel — Warehouse Display</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1117; color: #fff; font-family: Arial, sans-serif; min-height: 100vh; }

  .header {
    background: #1a1d27;
    padding: 14px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 3px solid #00b894;
  }
  .logo { font-size: 22px; font-weight: 900; color: #00b894; }
  .logo-sub { font-size: 13px; color: #888; margin-top: 2px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #00b894; display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
  .clock { font-size: 32px; font-weight: 900; font-variant-numeric: tabular-nums; }
  .dateth { font-size: 13px; color: #888; text-align: right; margin-top: 2px; }

  .cols {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
    height: calc(100vh - 72px);
  }

  .col {
    padding: 16px;
    border-right: 1px solid #2a2d3a;
    overflow-y: auto;
  }
  .col:last-child { border-right: none; }

  .col-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 2px solid;
  }
  .col-header.new { border-color: #fdcb6e; }
  .col-header.packing { border-color: #74b9ff; }
  .col-header.ready { border-color: #00b894; }

  .col-title { font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
  .col-title.new { color: #fdcb6e; }
  .col-title.packing { color: #74b9ff; }
  .col-title.ready { color: #00b894; }
  .col-count {
    font-size: 13px;
    font-weight: 700;
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .col-count.new { background: #fdcb6e22; color: #fdcb6e; }
  .col-count.packing { background: #74b9ff22; color: #74b9ff; }
  .col-count.ready { background: #00b89422; color: #00b894; }

  /* Order cards */
  .order-card {
    background: #1a1d27;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 12px;
    border-left: 5px solid #fdcb6e;
    position: relative;
  }
  .order-card.packing { border-left-color: #74b9ff; }
  .order-card.ready { border-left-color: #00b894; }

  /* Blinking for new orders */
  .order-card.blinking {
    animation: blink 1s infinite;
  }
  @keyframes blink {
    0%, 100% { box-shadow: 0 0 0 0 #fdcb6e00; background: #1a1d27; }
    50% { box-shadow: 0 0 20px 4px #fdcb6e66; background: #2a2415; }
  }

  .order-id { font-size: 26px; font-weight: 900; margin-bottom: 4px; }
  .order-customer { font-size: 14px; color: #ccc; margin-bottom: 2px; }
  .order-zone { font-size: 12px; color: #666; margin-bottom: 10px; }

  .order-items { border-top: 1px solid #2a2d3a; padding-top: 10px; margin-bottom: 10px; }
  .order-item {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    padding: 3px 0;
  }
  .order-item-code { font-weight: 700; color: #fff; }
  .order-item-qty { color: #00b894; font-weight: 700; }
  .order-clips {
    font-size: 13px;
    color: #aaa;
    background: #0f1117;
    border-radius: 6px;
    padding: 6px 10px;
    margin-bottom: 10px;
  }

  /* Action buttons */
  .btn-accept {
    width: 100%;
    padding: 12px;
    background: #fdcb6e;
    color: #1a1d27;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    letter-spacing: 0.03em;
  }
  .btn-accept:active { opacity: 0.8; transform: scale(0.98); }

  .btn-ready {
    width: 100%;
    padding: 12px;
    background: #00b894;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-ready:active { opacity: 0.8; transform: scale(0.98); }

  .order-time { font-size: 11px; color: #444; margin-top: 6px; text-align: right; }

  /* Empty col */
  .empty-col {
    text-align: center;
    padding: 40px 10px;
    color: #333;
    font-size: 14px;
  }
  .empty-col-icon { font-size: 36px; margin-bottom: 8px; }

  /* New order alert overlay */
  .alert-overlay {
    position: fixed;
    inset: 0;
    border: 6px solid #fdcb6e;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 100;
  }
  .alert-overlay.show { opacity: 1; animation: borderBlink 0.8s infinite; }
  @keyframes borderBlink {
    0%, 100% { border-color: #fdcb6e; }
    50% { border-color: transparent; }
  }

  .alert-banner {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #fdcb6e;
    color: #1a1d27;
    font-size: 42px;
    font-weight: 900;
    padding: 24px 48px;
    border-radius: 20px;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    z-index: 101;
  }
  .alert-banner.show { opacity: 1; animation: bannerPulse 0.8s infinite; }
  @keyframes bannerPulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.05); }
  }
  .alert-sub { font-size: 18px; font-weight: 400; margin-top: 6px; }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>

<div class="alert-overlay" id="alert-overlay"></div>
<div class="alert-banner" id="alert-banner">
  🔔 ออเดอร์ใหม่เข้า!
  <div class="alert-sub">กดรับออเดอร์บนมือถือ</div>
</div>

<!-- Header -->
<div class="header">
  <div>
    <div class="logo">📦 KP Wallpanel — Warehouse</div>
    <div class="logo-sub"><span class="status-dot"></span>Live real-time</div>
  </div>
  <div style="text-align:right">
    <div class="clock" id="clock">00:00:00</div>
    <div class="dateth" id="dateth"></div>
  </div>
</div>

<!-- 3 columns -->
<div class="cols">
  <!-- NEW -->
  <div class="col">
    <div class="col-header new">
      <span class="col-title new">🆕 New / ใหม่</span>
      <span class="col-count new" id="cnt-new">0</span>
    </div>
    <div id="col-new"></div>
  </div>

  <!-- PACKING -->
  <div class="col">
    <div class="col-header packing">
      <span class="col-title packing">📦 Packing / แพ็คอยู่</span>
      <span class="col-count packing" id="cnt-packing">0</span>
    </div>
    <div id="col-packing"></div>
  </div>

  <!-- READY -->
  <div class="col">
    <div class="col-header ready">
      <span class="col-title ready">✅ Ready / พร้อมส่ง</span>
      <span class="col-count ready" id="cnt-ready">0</span>
    </div>
    <div id="col-ready"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyBhUzwMR28dvulez9q6AZ4gZS80Y9VK0qQ",
  authDomain: "kp-wallpanel.firebaseapp.com",
  databaseURL: "https://kp-wallpanel-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kp-wallpanel",
  storageBucket: "kp-wallpanel.firebasestorage.app",
  messagingSenderId: "794246593779",
  appId: "1:794246593779:web:703fc0a4ba89ba58734b86"
});
var db = firebase.database();

// Clock
function updateClock() {
  var now = new Date();
  document.getElementById('clock').textContent =
    String(now.getHours()).padStart(2,'0')+':'+
    String(now.getMinutes()).padStart(2,'0')+':'+
    String(now.getSeconds()).padStart(2,'0');
  var days = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'];
  var months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  document.getElementById('dateth').textContent =
    'วัน'+days[now.getDay()]+' '+now.getDate()+' '+months[now.getMonth()]+' '+(now.getFullYear()+543);
}
setInterval(updateClock, 1000);
updateClock();

// Sound
var soundUnlocked = false;
document.addEventListener('click', function() { soundUnlocked = true; });
document.addEventListener('touchstart', function() { soundUnlocked = true; });

function playAlertSound() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    function beep(f, t, d) {
      var o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = f; o.type = 'sine';
      g.gain.setValueAtTime(0.4, ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+t+d);
      o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+d+0.05);
    }
    beep(440, 0, 0.15); beep(550, 0.2, 0.15); beep(660, 0.4, 0.15); beep(880, 0.6, 0.4);
    beep(440, 1.2, 0.15); beep(550, 1.4, 0.15); beep(660, 1.6, 0.15); beep(880, 1.8, 0.4);
  } catch(e) {}
}

// Alert state
var alertActive = false;
var alertInterval = null;

function startAlert() {
  if(alertActive) return;
  alertActive = true;
  document.getElementById('alert-overlay').classList.add('show');
  document.getElementById('alert-banner').classList.add('show');
  playAlertSound();
  alertInterval = setInterval(function() {
    playAlertSound();
  }, 3000);
}

function stopAlert() {
  alertActive = false;
  clearInterval(alertInterval);
  document.getElementById('alert-overlay').classList.remove('show');
  document.getElementById('alert-banner').classList.remove('show');
}

// Change order status
function backToNew(id) {
  db.ref('orders/'+id+'/status').set('new');
  db.ref('orders/'+id+'/log').push({status:'new',time:new Date().toISOString(),by:'Warehouse'});
}

function acceptOrder(id) {
  db.ref('orders/'+id+'/status').set('packing');
  db.ref('orders/'+id+'/log').push({
    status: 'packing',
    time: new Date().toISOString(),
    by: 'Warehouse'
  });
}

function markReady(id) {
  db.ref('orders/'+id+'/status').set('ready');
  db.ref('orders/'+id+'/log').push({
    status: 'ready',
    time: new Date().toISOString(),
    by: 'Warehouse'
  });
}

// Build order items HTML
function buildItems(o) {
  var lineItems = o.lineItems || [];
  var panels = lineItems.filter(function(i){ return i.type==='panel'; });
  var edges = lineItems.filter(function(i){ return i.type==='lcorner'||i.type==='utrim'||i.type==='ttrim'||i.type==='pvc'; });
  var totalClips = 0;
  lineItems.forEach(function(i){
    if(i.type==='free-clips'||i.type==='clips'||i.type==='free-gift-clips') totalClips += (parseInt(i.qty)||0);
  });

  var html = '<div class="order-items">';
  panels.forEach(function(i){
    html += '<div class="order-item"><span class="order-item-code">'+i.code+'</span><span class="order-item-qty">'+i.qty+' pcs</span></div>';
  });
  edges.forEach(function(i){
    var typeLabel = {lcorner:'L-Corner',utrim:'U-Trim',ttrim:'T-Trim',pvc:'PVC'}[i.type]||'';
    html += '<div class="order-item"><span class="order-item-code">'+typeLabel+' '+i.code+'</span><span class="order-item-qty">'+i.qty+' pcs</span></div>';
  });
  html += '</div>';
  if(totalClips > 0) html += '<div class="order-clips">📎 Clips รวม: <strong>'+totalClips+' pcs</strong></div>';
  return html;
}

// Render
var knownNewIds = null;

function render(orders) {
  var newOrders = [], packingOrders = [], readyOrders = [];
  var newIds = new Set();

  Object.values(orders||{}).forEach(function(o) {
    if(o.status==='new') { newOrders.push(o); newIds.add(o.id); }
    else if(o.status==='packing') packingOrders.push(o);
    else if(o.status==='ready') readyOrders.push(o);
  });

  // Check for new orders to alert
  if(knownNewIds !== null) {
    var hasNew = false;
    newIds.forEach(function(id){ if(!knownNewIds.has(id)) hasNew = true; });
    if(hasNew) startAlert();
  }
  // Stop alert if no more new orders
  if(newIds.size === 0) stopAlert();
  knownNewIds = newIds;

  // Update counts
  document.getElementById('cnt-new').textContent = newOrders.length;
  document.getElementById('cnt-packing').textContent = packingOrders.length;
  document.getElementById('cnt-ready').textContent = readyOrders.length;

  // Render NEW column
  document.getElementById('col-new').innerHTML = newOrders.length === 0
    ? '<div class="empty-col"><div class="empty-col-icon">😴</div>ไม่มีออเดอร์ใหม่</div>'
    : newOrders.map(function(o) {
        return '<div class="order-card blinking">'+
          '<div class="order-id">'+o.id+'</div>'+
          '<div class="order-customer">👤 '+(o.customer||'—')+'</div>'+
          '<div class="order-zone">📍 '+(o.zone||'')+'</div>'+
          buildItems(o)+
          '<button class="btn-accept" onclick="acceptOrder(\''+o.id+'\')">✋ รับออเดอร์ / Accept</button>'+
          '<div class="order-time">'+o.date+'</div>'+
          '</div>';
      }).join('');

  // Render PACKING column
  document.getElementById('col-packing').innerHTML = packingOrders.length === 0
    ? '<div class="empty-col"><div class="empty-col-icon">💤</div>ไม่มีออเดอร์</div>'
    : packingOrders.map(function(o) {
        return '<div class="order-card packing">'+
          '<div class="order-id">'+o.id+'</div>'+
          '<div class="order-customer">👤 '+(o.customer||'—')+'</div>'+
          '<div class="order-zone">📍 '+(o.zone||'')+'</div>'+
          buildItems(o)+
          '<button class="btn-ready" onclick="markReady(\''+o.id+'\')">✅ แพ็คเสร็จ / Ready</button>'+
          '<div class="order-time">'+o.date+'</div>'+
          '</div>';
      }).join('');

  // Render READY column
  document.getElementById('col-ready').innerHTML = readyOrders.length === 0
    ? '<div class="empty-col"><div class="empty-col-icon">🕐</div>รอ Driver รับ</div>'
    : readyOrders.map(function(o) {
        var oid = o.id||'?';
        return '<div class="order-card ready">'+
          '<div class="order-id">'+oid+'</div>'+
          '<div class="order-customer">👤 '+(o.customer||'—')+'</div>'+
          '<div class="order-zone">📍 '+(o.zone||'')+'</div>'+
          buildItems(o)+
          '<div style="text-align:center;padding:10px;font-size:13px;color:#00b894">⏳ รอ Driver มารับ</div>'+
          '<div class="order-time">'+(o.date||'')+'</div>'+
          '</div>';
      }).join('');
}

db.ref('orders').on('value', function(snap) {
  render(snap.val()||{});
});
</script>
</body>
</html>
