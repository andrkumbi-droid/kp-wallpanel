<!-- ── SMART-TV COMPAT ───────────────────────────────────────────────────
     Old TV browsers (Tizen / webOS / older Android TV) often lack ES2017
     helpers; one missing method blanks the whole screen with no way to see
     why (no devtools on a TV). Polyfill the few we use, and show any real
     error on-screen so it can be photographed instead of a black screen. -->
<script>
(function(){
  // --- polyfills ---
  if(!String.prototype.padStart){
    String.prototype.padStart=function(len,pad){
      var s=String(this); pad=pad===undefined?' ':String(pad);
      if(!pad) return s;
      while(s.length<len) s=pad+s;
      return s.length>len?s.slice(s.length-len):s;
    };
  }
  if(!Object.values){
    Object.values=function(o){ var r=[]; for(var k in o){ if(Object.prototype.hasOwnProperty.call(o,k)) r.push(o[k]); } return r; };
  }
  if(!Array.prototype.find){
    Array.prototype.find=function(fn){ for(var i=0;i<this.length;i++){ if(fn(this[i],i,this)) return this[i]; } };
  }
  if(!Array.prototype.includes){
    Array.prototype.includes=function(v){ return this.indexOf(v)>=0; };
  }
  // --- on-screen error reporter (TVs have no devtools) ---
  function showErr(msg){
    var d=document.getElementById('tv-err');
    if(!d){
      d=document.createElement('div'); d.id='tv-err';
      d.style.cssText='position:fixed;left:0;right:0;bottom:0;z-index:9999;background:#7f1d1d;color:#fff;font:14px/1.5 monospace;padding:12px 16px;max-height:45%;overflow:auto;white-space:pre-wrap;border-top:3px solid #fca5a5';
      (document.body||document.documentElement).appendChild(d);
    }
    d.textContent='⚠ Display error (send a photo of this to Andre):\n'+msg;
  }
  window.addEventListener('error',function(e){
    showErr((e.message||'script error')+(e.filename?'\n'+e.filename+':'+(e.lineno||'?'):''));
  });
  window.addEventListener('unhandledrejection',function(e){
    showErr('promise: '+((e.reason&&(e.reason.message||e.reason))||'unknown'));
  });
  window.__tvShowErr=showErr;
})();
</script>

  .alert-border.show { opacity: 1; animation: borderBlink 0.8s infinite; }
  @keyframes borderBlink { 0%,100%{border-color:#fdcb6e} 50%{border-color:transparent} }

  .alert-box { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #fdcb6e; color: #1a1d27; font-size: 36px; font-weight: 900; padding: 20px 40px; border-radius: 16px; text-align: center; pointer-events: none; opacity: 0; z-index: 101; }
  .alert-box.show { opacity: 1; animation: boxPulse 0.8s infinite; }

    position: fixed; bottom: 18px; right: 18px; z-index: 200;

<script>
if(typeof firebase==='undefined'){ window.__tvShowErr&&window.__tvShowErr('Firebase did not load — the display cannot show live orders. Check the TV browser internet / try a newer browser or a streaming stick.'); }
else {
firebase.initializeApp({

  messagingSenderId: "794246593779",
  appId: "1:794246593779:web:703fc0a4ba89ba58734b86"
});
// SEASON ROOT — must match index.html (reads orders from v2/). See index.html.
var SEASON = 'v2';
var _rootDb = firebase.database();
var db = { ref: function(p){ return _rootDb.ref(SEASON + '/' + (p == null ? '' : p)); } };

function tick() {
  var n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
  var days=['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'];
  var months=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  document.getElementById('dateth').textContent='วัน'+days[n.getDay()]+' '+n.getDate()+' '+months[n.getMonth()]+' '+(n.getFullYear()+543);
}
setInterval(tick,1000); tick();

function beep(f,t,d,type){var ctx=getAudioCtx();var o=ctx.createOscillator(),g=ctx.createGain();o.type=type||'sine';o.connect(g);g.connect(ctx.destination);o.frequency.value=f;g.gain.setValueAtTime(0.4,ctx.currentTime+t);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+d);o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+d+0.05);}
function playSound() {
  try {
    var b=beep;
    b(440,0,0.15);b(550,0.2,0.15);b(660,0.4,0.15);b(880,0.6,0.4);
    b(440,1.2,0.15);b(550,1.4,0.15);b(660,1.6,0.15);b(880,1.8,0.4);
  } catch(e){}
}
// Distinct alert for ORDER CHANGES: low/high two-tone "warble" with a square wave
function playChangeSound() {
  try {
    var b=beep;
    b(330,0,0.18,'square');b(494,0.22,0.18,'square');b(330,0.44,0.18,'square');b(494,0.66,0.5,'square');
    b(330,1.4,0.18,'square');b(494,1.62,0.18,'square');b(330,1.84,0.18,'square');b(494,2.06,0.5,'square');
  } catch(e){}
}

var audioCtx = null;
function getAudioCtx() {
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
// Unlock audio on first touch/click (required by browsers)
document.addEventListener('click', function(){ getAudioCtx(); }, {once:true});
document.addEventListener('touchstart', function(){ getAudioCtx(); }, {once:true});

var alertOn=false, alertTimer=null;
function startAlert(title, sub, sound) {
  var ax=document.getElementById('ax');
  ax.innerHTML = (title||'🔔 ออเดอร์ใหม่เข้า!')+'<div class="alert-sub">'+(sub||'กรุณารับออเดอร์ผ่านมือถือ')+'</div>';
  var snd = sound || playSound;
  if(alertOn) { snd(); return; }
  alertOn=true;
  document.getElementById('ab').classList.add('show');
  ax.classList.add('show');
  snd();
  alertTimer=setInterval(snd,3000);
}
function coDiffText(cr){
  if(!cr||!cr.diff)return'';
  return cr.diff.map(function(d){
    if((d.old||0)===0)return'➕ '+d.code+' ×'+d['new'];
    if((d['new']||0)===0)return'➖ '+d.code+' (เอาออก)';
    return '✏️ '+d.code+' '+d.old+'→'+d['new'];
  }).join(', ');
}
function coProdText(items){
  var pa=[],la=[];
  (items||[]).forEach(function(li){
    if(li.type==='panel')pa.push(li.code+' × '+li.qty);
    else if(li.type==='lcorner'||li.type==='tedge'||li.type==='uedge'||li.type==='ttrim'||li.type==='utrim')la.push(li.code+' × '+li.qty);
  });
  return pa.concat(la).join(' · ')||'—';
}
function changeBanner(o){
  var cr=o.changeReq; if(!cr||(cr.status!=='pending'&&cr.status!=='confirmed'))return'';
  var p=cr.status==='pending';
  return '<div class="change-banner"'+(p?'':' style="background:#16a34a"')+'>'+(p?'🔄 แก้ไขออเดอร์ / CHANGE':'✅ แก้ไขแล้ว / CHANGED')+'<br>'+coDiffText(cr).split(', ').join('<br>')+
    '<div style="font-size:14px;font-weight:400;margin-top:6px;opacity:.85;text-decoration:line-through">เดิม: '+coProdText(cr.oldItems)+'</div>'+
    '<div style="font-size:15px;font-weight:700;margin-top:2px">ใหม่: '+coProdText(cr.newItems)+'</div>'+
    (cr.note?'<br>📝 '+cr.note:'')+(p?'<div style="font-size:13px;font-weight:400;margin-top:4px">รอยืนยันผ่านมือถือ / confirm on phone</div>':'')+'</div>';
}
function ccls(o){ return (o.changeReq&&o.changeReq.status==='pending')?' change':''; }
function stopAlert() {
  alertOn=false;
  clearInterval(alertTimer);
  document.getElementById('ab').classList.remove('show');
  document.getElementById('ax').classList.remove('show');
}

function buildItems(o, cls) {
  var li = o.lineItems||[];
  var panels = li.filter(function(i){return i.type==='panel';});
  var edges = li.filter(function(i){return i.type==='lcorner'||i.type==='utrim'||i.type==='ttrim'||i.type==='pvc';});
  var clips = li.reduce(function(a,i){return (i.type==='free-clips'||i.type==='clips'||i.type==='free-gift-clips')?a+(parseInt(i.qty)||0):a;},0);
  var big = cls==='new'||cls==='packing';
  var sz = big ? 'font-size:20px;font-weight:900' : 'font-size:13px';
  var html = '<div class="items">';
  panels.forEach(function(i){ html+='<div class="item" style="padding:4px 0"><span class="item-code" style="'+sz+'">'+i.code+'</span><span class="item-qty" style="'+sz+'">'+i.qty+' pcs</span></div>'; });
  edges.forEach(function(i){
    var t=i.type==='lcorner'?'L-Corner':i.type==='utrim'?'U-Trim':i.type==='ttrim'?'T-Trim':'PVC';
    html+='<div class="item" style="padding:4px 0"><span class="item-code" style="'+sz+'">'+t+' '+i.code+'</span><span class="item-qty" style="'+sz+'">'+i.qty+' pcs</span></div>';
  });
  html+='</div>';
  if(clips>0) html+='<div class="clips" style="'+(big?'font-size:16px':'')+'">📎 Clips: <strong>'+clips.toLocaleString()+' pcs</strong></div>';
  return html;
}

var knownNew=null, knownChange=null;

function render(orders) {
  var nw=[], pk=[], rd=[], changeOrders=[];
  var newSet=new Set(), changeSet=new Set();
  Object.values(orders||{}).forEach(function(o) {
    if(!o||!o.id) return;
    if(o.changeReq && o.changeReq.status==='pending') { changeSet.add(o.id); changeOrders.push(o); return; }
    if(o.status==='new') { nw.push(o); newSet.add(o.id); }
    else if(o.status==='packing') pk.push(o);
    else if(o.status==='ready') rd.push(o);
  });
  // Pin change-requests to the TOP of the NEW column so they can't be missed
  nw = changeOrders.concat(nw);

  var hasNew=false, hasChange=false;
  if(knownNew!==null) newSet.forEach(function(id){ if(!knownNew.has(id)) hasNew=true; });
  if(knownChange!==null) changeSet.forEach(function(id){ if(!knownChange.has(id)) hasChange=true; });
  knownNew=newSet; knownChange=changeSet;

  // Changes ring continuously until confirmed (even after reload); new orders ring on arrival.
  if(changeSet.size>0){
    if(!alertOn || hasChange) startAlert('🔄 แก้ไขออเดอร์! / ORDER CHANGED','กรุณายืนยันผ่านมือถือ / confirm on phone', playChangeSound);
  } else if(newSet.size>0){
    if(hasNew) startAlert();
  } else {
    stopAlert();
  }

  document.getElementById('cnt-new').textContent=nw.length;
  document.getElementById('cnt-packing').textContent=pk.length;
  document.getElementById('cnt-ready').textContent=rd.length;

  // NEW column - no buttons, just info + hint
  document.getElementById('col-new').innerHTML = nw.length===0
    ? '<div class="empty"><div class="empty-icon">😴</div>ไม่มีออเดอร์ใหม่</div>'
    : nw.map(function(o){
        return '<div class="card new'+(o.priority?' prio':'')+ccls(o)+'">'+
          (o.priority?'<div class="prio-badge">⭐ ด่วน / PRIORITY</div>':'')+
          '<div class="order-id">'+o.id+'</div>'+
          changeBanner(o)+
          buildItems(o,'new')+
          '<div class="phone-hint">📱 รับผ่านมือถือ</div>'+
          '<div class="order-time">'+(o.date||'')+'</div>'+
          '</div>';
      }).join('');

  // PACKING column - no buttons
  document.getElementById('col-packing').innerHTML = pk.length===0
    ? '<div class="empty"><div class="empty-icon">💤</div>ไม่มีออเดอร์</div>'
    : pk.map(function(o){
        return '<div class="card packing'+(o.priority?' prio':'')+ccls(o)+'">'+
          (o.priority?'<div class="prio-badge">⭐ ด่วน / PRIORITY</div>':'')+
          '<div class="order-id">'+o.id+'</div>'+
          changeBanner(o)+
          buildItems(o,'packing')+
          '<div class="order-time">'+(o.date||'')+'</div>'+
          '</div>';
      }).join('');

  // READY column - show zone
  document.getElementById('col-ready').innerHTML = rd.length===0
    ? '<div class="empty"><div class="empty-icon">🕐</div>รอ Driver รับ</div>'
    : rd.map(function(o){
        return '<div class="card ready'+(o.priority?' prio':'')+ccls(o)+'">'+
          (o.priority?'<div class="prio-badge">⭐ ด่วน / PRIORITY</div>':'')+
          '<div class="order-id">'+o.id+'</div>'+
          '<div class="order-zone">📍 '+(o.zone||'')+'</div>'+
          changeBanner(o)+
          buildItems(o,'ready')+
          '<div class="order-time">'+(o.date||'')+'</div>'+
          '</div>';
      }).join('');
}

db.ref('orders').on('value', function(snap){ render(snap.val()||{}); });
}
</script>

<!-- Fullscreen kept in its own block so it works even if Firebase is slow/blocked -->
<script>
// ── FULLSCREEN (PC + phone → mirror to TV) ─────────────────────────────
var ICON_EXPAND='<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H3v5M16 3h5v5M21 16v5h-5M3 16v5h5"/></svg>';
var ICON_COMPRESS='<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h5V3M21 8h-5V3M16 21v-5h5M8 21v-5H3"/></svg>';
var fsbtn=document.getElementById('fsbtn');
var wakeLock=null, fsHideTimer=null;

function fsSupported(){ var d=document.documentElement; return !!(d.requestFullscreen||d.webkitRequestFullscreen||d.mozRequestFullScreen||d.msRequestFullscreen); }
function isFs(){ return !!(document.fullscreenElement||document.webkitFullscreenElement||document.mozFullScreenElement||document.msFullscreenElement); }
function enterFs(){ var d=document.documentElement; var fn=d.requestFullscreen||d.webkitRequestFullscreen||d.mozRequestFullScreen||d.msRequestFullscreen; return fn?fn.call(d):Promise.reject(); }
function exitFs(){ var fn=document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen||document.msExitFullscreen; if(fn) fn.call(document); }

// Keep the wall display awake while shown
function requestWake(){ try{ if('wakeLock' in navigator){ navigator.wakeLock.request('screen').then(function(w){ wakeLock=w; }).catch(function(){}); } }catch(e){} }
document.addEventListener('visibilitychange', function(){ if(document.visibilityState==='visible' && isFs()) requestWake(); });

function showTip(msg){ var t=document.getElementById('fstip'); if(!t) return; t.textContent=msg; t.style.display='block'; setTimeout(function(){ t.style.display='none'; }, 5000); }

function toggleFs(){
  if(isFs()){ exitFs(); return; }
  if(!fsSupported()){
    // iOS Safari has no element fullscreen — guide the user to the OS-level options.
    showTip('📱 iPhone: use AirPlay to mirror the whole screen to the TV / ใช้ AirPlay สะท้อนหน้าจอทั้งหมดขึ้นทีวี');
    return;
  }
  var p=enterFs();
  if(p && p.then) p.then(requestWake).catch(function(){ showTip('Fullscreen blocked by browser / เบราว์เซอร์บล็อกเต็มจอ'); });
  else requestWake();
}

function updateFsUi(){
  if(!fsbtn) return;
  fsbtn.innerHTML = isFs() ? ICON_COMPRESS : ICON_EXPAND;
  fsbtn.title = isFs() ? 'Exit fullscreen / ออกจากเต็มจอ (F)' : 'Fullscreen / เต็มจอ (F)';
  if(isFs()) scheduleHide(); else { clearTimeout(fsHideTimer); fsbtn.classList.remove('hide'); }
}
['fullscreenchange','webkitfullscreenchange','mozfullscreenchange','msfullscreenchange'].forEach(function(ev){ document.addEventListener(ev, updateFsUi); });

// On the wall display, fade the button out when idle; reveal on any activity
function scheduleHide(){ clearTimeout(fsHideTimer); if(isFs()){ fsHideTimer=setTimeout(function(){ if(fsbtn) fsbtn.classList.add('hide'); }, 3500); } }
function revealBtn(){ if(fsbtn) fsbtn.classList.remove('hide'); scheduleHide(); }
document.addEventListener('pointermove', revealBtn);
document.addEventListener('touchstart', revealBtn, {passive:true});

// Keyboard shortcut: F toggles (handy on a PC display)
document.addEventListener('keydown', function(e){ if((e.key==='f'||e.key==='F') && !e.ctrlKey && !e.metaKey && !e.altKey){ toggleFs(); } });

updateFsUi();
</script>
</body>
</html>
