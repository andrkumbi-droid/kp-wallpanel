<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<title>FIXTURE — Meta Business Suite Posteingang (Mock)</title>
<!-- Offline-Entwicklungsfixture: nachgebauter Business-Suite-Thread mit den
     data-kp-Attributen aus selectors.js. Ab morgen wird diese Datei durch
     einen ECHTEN DOM-Snapshot ergänzt (docs/CONCEPT.md → Selector discovery).
     Einfach im Browser öffnen — dev-shim.js mockt die chrome.*-APIs. -->
<style>
  body{margin:0;font:14px/1.5 system-ui,'Segoe UI',sans-serif;background:#f0f2f5}
  .top{background:#fff;border-bottom:1px solid #ddd;padding:10px 16px;font-weight:600}
  .wrap{display:flex;height:calc(100vh - 45px)}
  .list{width:240px;background:#fff;border-right:1px solid #ddd;padding:8px}
  .list div{padding:8px;border-radius:8px;cursor:pointer}
  .list .sel{background:#e7f0ff}
  .chat{flex:1;display:flex;flex-direction:column;max-width:640px}
  .thread{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
  .msg{max-width:70%;padding:8px 12px;border-radius:16px;white-space:pre-wrap}
  .msg[data-dir="in"]{background:#e4e6eb;align-self:flex-start}
  .msg[data-dir="out"]{background:#1877f2;color:#fff;align-self:flex-end}
  .composer-bar{padding:10px 16px;background:#fff;border-top:1px solid #ddd}
  [data-kp="composer"]{border:1px solid #ccd;border-radius:18px;padding:8px 14px;min-height:20px;outline:none;background:#f0f2f5}
  button.mock-new{margin:8px 16px;padding:6px 12px;border-radius:8px;border:1px solid #ccd;background:#fff;cursor:pointer}
</style>
</head>
<body>
<div class="top">Meta Business Suite — Posteingang (FIXTURE) · <span data-kp="customer-name">คุณสมชาย ใจดี</span></div>
<div class="wrap">
  <div class="list"><div class="sel">คุณสมชาย ใจดี</div><div>ช่างเปิ๊ล</div><div>ร้านบ้านสวย</div></div>
  <div class="chat">
    <div class="thread" data-kp="thread" id="thread">
      <div class="msg" data-kp="msg" data-dir="in"><span data-kp="text">สวัสดีครับ สนใจแผ่นผนัง WPC ครับ</span></div>
      <div class="msg" data-kp="msg" data-dir="out"><span data-kp="text">สวัสดีค่ะ ยินดีให้บริการค่ะ 😊 สนใจรุ่นไหนหรือสีไหนเป็นพิเศษไหมคะ</span></div>
      <div class="msg" data-kp="msg" data-dir="in"><span data-kp="text">KP054 มีของไหมครับ แล้วส่งชลบุรีค่าส่งเท่าไหร่ครับ</span></div>
    </div>
    <button class="mock-new" onclick="mockIncoming()">▶ Neue Kundennachricht simulieren</button>
    <div class="composer-bar">
      <div data-kp="composer" role="textbox" contenteditable="true"></div>
    </div>
  </div>
</div>

<script>
// Simulate a new incoming message (tests the MutationObserver path)
const MOCK_MSGS = [
  'เอาสีเดิมเหมือนครั้งที่แล้วครับ 10 แผ่น',
  'มีสีขาวไหมครับ ห้องนอน 3x4 เมตร ใช้กี่แผ่นครับ',
  'ลดได้ไหมครับ สั่ง 50 แผ่น 🙏',
  'ของถึงเมื่อไหร่ครับ สั่งไปเมื่อวาน เบอร์ 081-234-5678'
];
let mi = 0;
function mockIncoming(){
  const d = document.createElement('div');
  d.className = 'msg'; d.dataset.kp = 'msg'; d.dataset.dir = 'in';
  d.innerHTML = '<span data-kp="text"></span>';
  d.querySelector('span').textContent = MOCK_MSGS[mi++ % MOCK_MSGS.length];
  document.getElementById('thread').appendChild(d);
}
</script>
<!-- chrome.* mock MUSS vor den Content-Scripts geladen werden -->
<script src="dev-shim.js"></script>
<script src="../extension/content/selectors.js"></script>
<script src="../extension/content/inbox-live.js"></script>
<script src="../extension/content/composer.js"></script>
<script src="../extension/content/overlay.js"></script>
<script src="../extension/content/inbox-observer.js"></script>
<link rel="stylesheet" href="../extension/content/overlay.css">
</body>
</html>
