<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>KP Meta Assistant — Optionen</title>
  <style>
    body{font:14px/1.5 system-ui,sans-serif;max-width:560px;margin:40px auto;padding:0 16px;color:#1c1e24}
    label{display:block;font-weight:600;margin:16px 0 4px}
    input,select{width:100%;box-sizing:border-box;padding:7px 9px;border:1px solid #ccd;border-radius:8px;font:inherit}
    button{margin-top:20px;padding:8px 18px;border:none;border-radius:8px;background:#1877f2;color:#fff;font:inherit;cursor:pointer}
    #status{margin-left:10px;color:#2a6}
    .hint{font-size:12px;color:#65707e;margin-top:3px}
  </style>
</head>
<body>
  <h2>KP Meta Assistant</h2>
  <label>Backend-URL (Apps Script /exec)</label>
  <input id="backendUrl" placeholder="https://script.google.com/macros/s/…/exec">
  <div class="hint">Aus dem Deployment von apps-script/meta-assistant.gs. Keys bleiben dort — nie hier.</div>
  <label>Shared Token</label>
  <input id="token" placeholder="kp-meta-…">
  <div class="hint">Muss SHARED_TOKEN in meta-assistant.gs entsprechen.</div>
  <label>Übersetzungssprache (Default)</label>
  <select id="lang"><option value="de">Deutsch</option><option value="en">English</option></select>
  <button id="save">Speichern</button><span id="status"></span>
  <script src="options.js"></script>
</body>
</html>
